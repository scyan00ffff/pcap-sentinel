<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>pcap-sentinel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='uploads.js') }} "></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1>pcap<span style="color:var(--fg-4)">-</span><span style="color:var(--accent)">sentinel</span></h1>
        <div class="tb-cap" id="capture-chip">
            <span style="color:var(--fg-4)">no file loaded</span>
        </div>
        <div class="tb-status" id="status-pill">
            <span class="tb-status-dot"></span>
            <span id="status-text">ready</span>
        </div>
        <div class="header-actions">
            <a href="/download" class="tb-btn">⬇ Download Report</a>
            <button class="dark-mode-btn" id="dark-mode-toggle">🌙 Dark Mode </button>
            <form id="upload-form" enctype="multipart/form-data">
                <label for="pcap-upload" class="upload-btn">📂 Upload PCAP</label> 
                <input type="file" id="pcap-upload" name="file" accept=".pcap, .pcapng" style="display: none;">
            </form>
            <button class="rescan-btn" id="rescan-btn">🔄 Re-scan</button>
        </div>
    
    </div>
    <div class="page-wrapper">
        <div class="sidebar">
            <h3>Navigation</h3>
            <a href="/" class="filter-btn {% if current_page == 'overview' %}active{% endif %}">🏠 Overview</a>
            <hr class="sidebar-divider">
            <h3>Scanners</h3>
            <a href="/syn" class="filter-btn {% if current_page == 'syn' %}active{% endif %}">🔍 SYN Scan</a>
            <a href="/credential-detection" class="filter-btn {% if current_page == 'credential' %}active{% endif %}">🔑 Credential Detection</a>
            <a href="/data-exfiltration" class="filter-btn {% if current_page == 'data' %}active{% endif %}">📤 Data Exfiltration</a>
            <a href="/dns-tunnelling" class="filter-btn {% if current_page == 'dns' %}active{% endif %}">🌐 DNS Tunnelling</a>
            <a href="/brute-force" class="filter-btn {% if current_page == 'bruteforce' %}active{% endif %}">🔓 Brute Force</a>
            <a href="/anomolous-traffic" class="filter-btn {% if current_page == 'anomolous' %}active{% endif %}">⚠️ Anomolous Traffic</a>
            <a href="/threat-intel" class="filter-btn {% if current_page == 'threat' %}active{% endif %}">🛡️ Threat Intel</a>
            <hr class="sidebar-divider">
            <h3>Live</h3>
            <a href="/live" class="filter-btn {% if current_page == 'live' %}active{% endif %}">📡 Live Monitor</a>
        </div>
        <div class="main-dashboard">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</body>
</html>
